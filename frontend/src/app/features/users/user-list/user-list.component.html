<mat-card>
  <mat-card-header>
    <mat-card-title>Users</mat-card-title>
    <span class="spacer"></span>
    <button mat-raised-button color="primary" routerLink="new" *appHasPermission="['users','create']">
      <mat-icon>person_add</mat-icon> New User
    </button>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>

    <table mat-table [dataSource]="users" class="full-width" *ngIf="!loading">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="roles">
        <th mat-header-cell *matHeaderCellDef>Roles</th>
        <td mat-cell *matCellDef="let user">
          <mat-chip-listbox>
            <mat-chip *ngFor="let role of user.roles">{{ role.name }}</mat-chip>
          </mat-chip-listbox>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let user">
          <span [class]="user.isActive ? 'badge-active' : 'badge-inactive'">
            {{ user.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button color="primary" [routerLink]="[user._id, 'edit']"
                  matTooltip="Edit" *appHasPermission="['users','edit']">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteUser(user._id)"
                  matTooltip="Delete" *appHasPermission="['users','delete']">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <p *ngIf="!loading && users.length === 0" class="empty-msg">No users found.</p>
  </mat-card-content>
</mat-card>
