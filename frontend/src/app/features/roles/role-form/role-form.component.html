<mat-card>
  <mat-card-header>
    <mat-card-title>{{ isEdit ? 'Edit Role' : 'Create Role' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Role Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g. Manager" />
        <mat-error *ngIf="form.get('name')?.hasError('required')">Role name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <input matInput formControlName="description" placeholder="Optional description" />
      </mat-form-field>

      <h3 class="section-title">Permission Matrix</h3>
      <app-permission-matrix
        [modules]="modules"
        [permissions]="permissions"
        (permissionsChange)="onPermissionsChange($event)"
      ></app-permission-matrix>

      <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/roles">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          <span *ngIf="!loading">{{ isEdit ? 'Update' : 'Create' }}</span>
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
