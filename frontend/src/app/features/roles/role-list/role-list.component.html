<mat-card>
  <mat-card-header>
    <mat-card-title>Roles</mat-card-title>
    <span class="spacer"></span>
    <button mat-raised-button color="primary" routerLink="new" *appHasPermission="['roles','create']">
      <mat-icon>add</mat-icon> New Role
    </button>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>

    <table mat-table [dataSource]="roles" class="full-width" *ngIf="!loading">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Role Name</th>
        <td mat-cell *matCellDef="let role">{{ role.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let role">{{ role.description || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let role">
          <button mat-icon-button color="primary" [routerLink]="[role._id, 'edit']"
                  matTooltip="Edit" *appHasPermission="['roles','edit']">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteRole(role._id)"
                  matTooltip="Delete" *appHasPermission="['roles','delete']">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <p *ngIf="!loading && roles.length === 0" class="empty-msg">No roles found.</p>
  </mat-card-content>
</mat-card>
