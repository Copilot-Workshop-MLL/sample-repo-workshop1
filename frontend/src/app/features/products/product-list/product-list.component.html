<div class="page-header">
  <h2>Products</h2>
  <div class="action-buttons">
    <button mat-stroked-button (click)="search()" *ngIf="permissionService.can('products','search')" matTooltip="Search Products">
      <mat-icon>search</mat-icon> Search
    </button>
    <button mat-stroked-button (click)="exportData()" *ngIf="permissionService.can('products','export')" matTooltip="Export to CSV">
      <mat-icon>download</mat-icon> Export
    </button>
    <button mat-stroked-button (click)="importData()" *ngIf="permissionService.can('products','import')" matTooltip="Import from CSV">
      <mat-icon>upload</mat-icon> Import
    </button>
    <button mat-raised-button color="primary" routerLink="new" *ngIf="permissionService.can('products','create')">
      <mat-icon>add</mat-icon> Add Product
    </button>
  </div>
</div>

<!-- Search bar (visible after clicking Search) -->
<mat-card class="search-card" *ngIf="showSearch && permissionService.can('products','search')">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search products</mat-label>
    <input matInput [(ngModel)]="searchQuery" (ngModelChange)="applySearch()" placeholder="Name, SKU, category...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>
</mat-card>

<mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="filteredProducts" class="full-width">

      <ng-container matColumnDef="sku">
        <th mat-header-cell *matHeaderCellDef>SKU</th>
        <td mat-cell *matCellDef="let p">{{ p.sku }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let p"><strong>{{ p.name }}</strong><br><small class="text-muted">{{ p.description }}</small></td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Category</th>
        <td mat-cell *matCellDef="let p"><mat-chip>{{ p.category }}</mat-chip></td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let p"><strong>${{ p.price | number:'1.2-2' }}</strong></td>
      </ng-container>

      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef>Stock</th>
        <td mat-cell *matCellDef="let p">
          <span [class]="p.stock < 30 ? 'stock-low' : 'stock-ok'">{{ p.stock }} units</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let p">
          <mat-chip [color]="p.isActive ? 'primary' : 'warn'" selected>{{ p.isActive ? 'Active' : 'Inactive' }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button color="primary" [routerLink]="[p._id, 'edit']" *ngIf="permissionService.can('products','edit')" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(p._id)" *ngIf="permissionService.can('products','delete')" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row no-data-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">No products found.</td>
      </tr>
    </table>

    <!-- hidden file input for import -->
    <input type="file" #fileInput accept=".csv" style="display:none" (change)="onFileSelected($event)">
  </mat-card-content>
</mat-card>
