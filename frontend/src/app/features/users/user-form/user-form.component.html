<mat-card>
  <mat-card-header>
    <mat-card-title>{{ isEdit ? 'Edit User' : 'Create User' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="name" />
        <mat-error>Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width" *ngIf="!isEdit">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
        <mat-error>Valid email required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password {{ isEdit ? '(leave blank to keep)' : '' }}</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Assigned Roles</mat-label>
        <mat-select formControlName="roles" multiple>
          <mat-option *ngFor="let role of availableRoles" [value]="role._id">
            {{ role.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/users">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          <span *ngIf="!loading">{{ isEdit ? 'Update' : 'Create' }}</span>
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
